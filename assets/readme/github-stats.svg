  <path d="M72 68L118 42M1108 68L1132 42M72 492L48 518M1108 492L1132 518" stroke="#EF4444" stroke-width="2"/>
  <path d="M1044 88l12 24 27 4-20 19 5 27-24-13-24 13 5-27-20-19 27-4 12-24z" fill="#F5F3FF" stroke="#A855F7" stroke-width="3"/>
</svg>
