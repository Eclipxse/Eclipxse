<svg width="1180" height="560" viewBox="0 0 1180 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Signal Analytics</title>
  <desc id="desc">A dark purple and red command-center GitHub stats dashboard for Eclipxse.</desc>
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="1180" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05020A"/>
      <stop offset="0.48" stop-color="#170724"/>
      <stop offset="1" stop-color="#05020A"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#EF4444"/>
      <stop offset="0.52" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M0 18H18" stroke="#25113B" stroke-width="1" opacity="0.55"/>
    </pattern>
  </defs>

  <rect width="1180" height="560" fill="url(#screen)"/>
  <rect width="1180" height="560" fill="url(#scan)" opacity="0.7"/>
  <path d="M48 42H1132V518H48V42Z" fill="#080410" stroke="#6D28D9" stroke-width="2"/>
  <path d="M72 68H1108V492H72V68Z" fill="#0C0615" stroke="#281341" stroke-width="1.5"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="104" y="116" fill="#F5F3FF" font-size="34" font-weight="950">Signal Analytics</text>
    <text x="104" y="143" fill="#A78BFA" font-size="14" font-weight="800" letter-spacing="3">GITHUB PROFILE TELEMETRY / UPDATED JUN 30 2026</text>
    <rect x="892" y="88" width="154" height="40" fill="#12071E" stroke="#EF4444"/>
    <text x="918" y="114" fill="#F5F3FF" font-size="14" font-weight="900">REAL DATA</text>

    <g filter="url(#glow)">
      <circle cx="240" cy="300" r="112" fill="#090413" stroke="#A855F7" stroke-width="3"/>
      <circle cx="240" cy="300" r="78" fill="none" stroke="#EF4444" stroke-width="14" stroke-dasharray="220 490" transform="rotate(-90 240 300)"/>
      <circle cx="240" cy="300" r="52" fill="none" stroke="#38BDF8" stroke-width="4" opacity="0.8"/>
    </g>
    <text x="188" y="292" fill="#F5F3FF" font-size="74" font-weight="950">49</text>
    <text x="166" y="330" fill="#C4B5FD" font-size="16" font-weight="800">CONTRIBUTIONS</text>
    <text x="176" y="356" fill="#7DD3FC" font-size="12" font-weight="900">13 ACTIVE DAYS</text>

    <rect x="414" y="196" width="170" height="104" fill="#12071E" stroke="#EF4444"/>
    <text x="438" y="242" fill="#F5F3FF" font-size="40" font-weight="950">12</text>
    <text x="438" y="270" fill="#C4B5FD" font-size="13" font-weight="850">PUBLIC REPOS</text>

    <rect x="612" y="196" width="170" height="104" fill="#12071E" stroke="#A855F7"/>
    <text x="636" y="242" fill="#F5F3FF" font-size="40" font-weight="950">3</text>
    <text x="636" y="270" fill="#C4B5FD" font-size="13" font-weight="850">DAY STREAK</text>

    <rect x="810" y="196" width="170" height="104" fill="#12071E" stroke="#38BDF8"/>
    <text x="834" y="242" fill="#F5F3FF" font-size="40" font-weight="950">0</text>
    <text x="834" y="270" fill="#C4B5FD" font-size="13" font-weight="850">STARS</text>

    <rect x="414" y="330" width="566" height="96" fill="#0A0511" stroke="#29143F"/>
    <text x="438" y="363" fill="#F5F3FF" font-size="16" font-weight="900">LANGUAGE MIX</text>
    <rect x="438" y="384" width="404" height="14" fill="#111827"/>
    <rect x="438" y="384" width="162" height="14" fill="#EF4444"/>
    <rect x="600" y="384" width="122" height="14" fill="#A855F7"/>
    <rect x="722" y="384" width="82" height="14" fill="#38BDF8"/>
    <rect x="804" y="384" width="38" height="14" fill="#7C3AED"/>
    <circle cx="868" cy="356" r="6" fill="#EF4444"/><text x="884" y="361" fill="#C4B5FD" font-size="13" font-weight="800">JavaScript 4</text>
    <circle cx="868" cy="383" r="6" fill="#A855F7"/><text x="884" y="388" fill="#C4B5FD" font-size="13" font-weight="800">TypeScript 3</text>
    <circle cx="868" cy="410" r="6" fill="#38BDF8"/><text x="884" y="415" fill="#C4B5FD" font-size="13" font-weight="800">Vue 2</text>

    <text x="104" y="470" fill="#F5F3FF" font-size="15" font-weight="900">BEST DAY</text>
    <path d="M198 465H414" stroke="url(#signal)" stroke-width="6"/>
    <text x="434" y="470" fill="#C4B5FD" font-size="14" font-weight="800">12 contributions on Jun 26</text>
    <text x="760" y="470" fill="#F5F3FF" font-size="15" font-weight="900">LONGEST STREAK</text>
    <path d="M912 465H980" stroke="#A855F7" stroke-width="6"/>
    <text x="996" y="470" fill="#C4B5FD" font-size="14" font-weight="800">3 days</text>
