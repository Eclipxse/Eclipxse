    <text x="922" y="247" fill="#AEB5C2" font-family="Consolas, Segoe UI, sans-serif" font-size="8">26</text>
    <text x="956" y="247" fill="#AEB5C2" font-family="Consolas, Segoe UI, sans-serif" font-size="8">28</text>
