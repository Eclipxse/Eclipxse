<svg width="1180" height="450" viewBox="0 0 1180 450" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Console</title>
  <desc id="desc">A bold graphite neo-brutalist GitHub stats board with skeuomorphic meters.</desc>
  <defs>
    <linearGradient id="raised" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#F4F5F7"/>
      <stop offset="0.58" stop-color="#B9C0CA"/>
      <stop offset="1" stop-color="#78808D"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#252B36"/>
      <stop offset="1" stop-color="#10131A"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="120%" height="125%">
      <feDropShadow dx="8" dy="8" stdDeviation="0" flood-color="#050507"/>
    </filter>
  </defs>

  <rect width="1180" height="450" fill="#090B10"/>
  <rect x="58" y="42" width="1064" height="330" rx="8" fill="#050507"/>
  <rect x="46" y="30" width="1064" height="330" rx="8" fill="#1A1E27" stroke="#050507" stroke-width="5"/>
  <path d="M80 104H1076" stroke="#303642" stroke-width="2"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="80" y="82" fill="#F4F5F7" font-size="31" font-weight="950">GitHub Console</text>
    <text x="322" y="82" fill="#AAB1BD" font-size="14" font-weight="800">updated Jun 30, 2026</text>

    <g filter="url(#shadow)">
      <rect x="80" y="132" width="250" height="156" rx="8" fill="url(#raised)" stroke="#050507" stroke-width="4"/>
      <path d="M92 144H318" stroke="#FFFFFF" stroke-width="2" opacity="0.65"/>
      <text x="108" y="166" fill="#252A35" font-size="12" font-weight="950" letter-spacing="2">CONTRIBUTIONS</text>
      <text x="108" y="237" fill="#0B0D12" font-size="70" font-weight="950">49</text>
      <text x="205" y="237" fill="#7C3AED" font-size="18" font-weight="950">last year</text>
      <rect x="108" y="256" width="170" height="12" rx="6" fill="#5D6674"/>
      <rect x="108" y="256" width="100" height="12" rx="6" fill="#8B5CF6"/>
    </g>

    <g filter="url(#shadow)">
      <rect x="370" y="132" width="154" height="82" rx="8" fill="url(#dark)" stroke="#050507" stroke-width="4"/>
      <path d="M380 144H514" stroke="#FFFFFF" stroke-width="2" opacity="0.12"/>
      <text x="396" y="174" fill="#F4F5F7" font-size="36" font-weight="950">12</text>
      <text x="396" y="197" fill="#AAB1BD" font-size="12" font-weight="900">public repos</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="550" y="132" width="154" height="82" rx="8" fill="url(#dark)" stroke="#050507" stroke-width="4"/>
      <path d="M560 144H694" stroke="#FFFFFF" stroke-width="2" opacity="0.12"/>
      <text x="576" y="174" fill="#F4F5F7" font-size="36" font-weight="950">3</text>
      <text x="576" y="197" fill="#AAB1BD" font-size="12" font-weight="900">day streak</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="730" y="132" width="154" height="82" rx="8" fill="url(#dark)" stroke="#050507" stroke-width="4"/>
      <path d="M740 144H874" stroke="#FFFFFF" stroke-width="2" opacity="0.12"/>
      <text x="756" y="174" fill="#F4F5F7" font-size="36" font-weight="950">0</text>
      <text x="756" y="197" fill="#AAB1BD" font-size="12" font-weight="900">stars</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="910" y="132" width="166" height="82" rx="8" fill="#8B5CF6" stroke="#050507" stroke-width="4"/>
      <path d="M920 144H1064" stroke="#FFFFFF" stroke-width="2" opacity="0.24"/>
      <text x="936" y="170" fill="#F4F5F7" font-size="14" font-weight="950">STATUS</text>
      <text x="936" y="195" fill="#F4F5F7" font-size="12" font-weight="900">building + polish</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="370" y="246" width="706" height="82" rx="8" fill="url(#raised)" stroke="#050507" stroke-width="4"/>
      <path d="M382 258H1064" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
      <text x="396" y="286" fill="#0B0D12" font-size="17" font-weight="950">Language Mix</text>
      <rect x="396" y="302" width="390" height="12" rx="6" fill="#5D6674"/>
      <rect x="396" y="302" width="156" height="12" rx="6" fill="#F87171"/>
      <rect x="552" y="302" width="116" height="12" fill="#8B5CF6"/>
      <rect x="668" y="302" width="78" height="12" fill="#343B49"/>
      <rect x="746" y="302" width="40" height="12" rx="6" fill="#A78BFA"/>
      <text x="820" y="286" fill="#252A35" font-size="12" font-weight="950">JavaScript 4</text>
      <text x="820" y="309" fill="#252A35" font-size="12" font-weight="950">TypeScript 3</text>
      <text x="934" y="286" fill="#252A35" font-size="12" font-weight="950">Vue 2</text>
      <text x="934" y="309" fill="#252A35" font-size="12" font-weight="950">Kotlin 1</text>
    </g>

    <text x="80" y="348" fill="#8A92A3" font-size="12" font-weight="950" letter-spacing="2">BEST DAY</text>
    <text x="176" y="348" fill="#F4F5F7" font-size="12" font-weight="900">12 contributions on Jun 26</text>
    <text x="414" y="348" fill="#8A92A3" font-size="12" font-weight="950" letter-spacing="2">LONGEST STREAK</text>
    <text x="570" y="348" fill="#F4F5F7" font-size="12" font-weight="900">3 days</text>
  </g>
</svg>
