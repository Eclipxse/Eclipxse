    <text x="880" y="340" fill="#C4C9D2" font-family="Consolas, Segoe UI, sans-serif" font-size="9" font-weight="700">VUE 2</text>
    <text x="954" y="340" fill="#C4C9D2" font-family="Consolas, Segoe UI, sans-serif" font-size="9" font-weight="700">KT 1</text>
    <text x="1032" y="340" fill="#D66A7A" font-family="Consolas, Segoe UI, sans-serif" font-size="9" font-weight="700">STARS 0</text>
