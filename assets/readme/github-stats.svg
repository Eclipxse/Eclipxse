    <text x="586" y="296" fill="#777F8E" font-family="Consolas, Segoe UI, sans-serif" font-size="9" font-weight="700">BEST STREAK</text>
    <text x="586" y="338" fill="#F2F3F6" font-size="38" font-weight="900">03</text>
    <text x="647" y="336" fill="#AEB5C2" font-family="Consolas, Segoe UI, sans-serif" font-size="9">DAYS</text>

    <rect x="736" y="272" width="358" height="84" rx="5" fill="#0C0E14" stroke="#3B414D"/>
    <text x="756" y="296" fill="#777F8E" font-family="Consolas, Segoe UI, sans-serif" font-size="9" font-weight="700">LANGUAGE ALLOCATION</text>
    <rect x="756" y="310" width="318" height="10" rx="2" fill="#292E38"/>
    <rect x="756" y="310" width="145" height="10" rx="2" fill="#A978FF"/>
    <rect x="901" y="310" width="108" height="10" fill="#D84B60"/>
    <rect x="1009" y="310" width="54" height="10" fill="#58C9E6"/>
    <rect x="1063" y="310" width="11" height="10" rx="2" fill="#747C8A"/>
