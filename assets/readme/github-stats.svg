<svg width="1180" height="430" viewBox="0 0 1180 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Overview</title>
  <desc id="desc">A sleek graphite GitHub stats dashboard with subtle purple and soft red accents.</desc>
