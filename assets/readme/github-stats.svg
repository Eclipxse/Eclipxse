    <path d="M420 228H1070M420 198H1070M420 168H1070" stroke="#282D37" stroke-width="1"/>
    <path d="M420 228L452 228L484 228L516 228L548 228L580 228L612 228L644 228L676 228L708 228L740 228L772 228L804 228L836 228L868 228L900 228L932 151L964 202L996 164L1028 184L1070 228" stroke="url(#bar)" stroke-width="3" fill="none"/>
    <path d="M420 228L452 228L484 228L516 228L548 228L580 228L612 228L644 228L676 228L708 228L740 228L772 228L804 228L836 228L868 228L900 228L932 151L964 202L996 164L1028 184L1070 228V244H420Z" fill="url(#bar)" opacity="0.08"/>
    <circle cx="932" cy="151" r="5" fill="#D84B60" filter="url(#glow)"/>
    <circle cx="964" cy="202" r="4" fill="#8E5BEA"/>
    <circle cx="996" cy="164" r="5" fill="#9D68FF" filter="url(#glow)"/>
    <circle cx="1028" cy="184" r="4" fill="#58C9E6"/>
