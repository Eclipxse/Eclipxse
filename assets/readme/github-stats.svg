  <rect x="58" y="378" width="1064" height="28" fill="#08090D"/>
  <rect x="58" y="378" width="212" height="28" fill="url(#steel)"/>
  <text x="76" y="396" fill="#08090D" font-family="Consolas, Segoe UI, sans-serif" font-size="10" font-weight="800">LAST PEAK / 26 JUN 2026</text>
