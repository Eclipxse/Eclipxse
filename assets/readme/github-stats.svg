<svg width="1180" height="470" viewBox="0 0 1180 470" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Field Telemetry</title>
  <desc id="desc">GitHub activity telemetry for Eclipxse with contribution, repository, streak, and language data.</desc>
  <defs>
    <linearGradient id="back" x1="0" y1="0" x2="1180" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050609"/>
      <stop offset="0.52" stop-color="#0B0C11"/>
      <stop offset="1" stop-color="#050609"/>
    </linearGradient>
    <linearGradient id="body" x1="50" y1="36" x2="1130" y2="414" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1C1F27"/>
      <stop offset="0.46" stop-color="#11131A"/>
      <stop offset="1" stop-color="#08090D"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#A978FF"/>
      <stop offset="0.62" stop-color="#7547DB"/>
      <stop offset="1" stop-color="#D84B60"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#3F4551"/>
      <stop offset="0.45" stop-color="#D5DAE2"/>
      <stop offset="0.55" stop-color="#707784"/>
      <stop offset="1" stop-color="#353B46"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#D84B60"/>
      <stop offset="0.48" stop-color="#9D68FF"/>
      <stop offset="1" stop-color="#58C9E6"/>
    </linearGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0H0V20" stroke="#FFFFFF" stroke-opacity="0.03"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="145%">
      <feDropShadow dx="12" dy="14" stdDeviation="0" flood-color="#000000" flood-opacity="0.9"/>
      <feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1180" height="470" fill="url(#back)"/>
  <rect width="1180" height="470" fill="url(#grid)"/>
  <g filter="url(#shadow)">
    <rect x="50" y="36" width="1080" height="378" rx="8" fill="#06070A" stroke="#2B2F39" stroke-width="2"/>
    <rect x="58" y="44" width="1064" height="362" rx="5" fill="url(#body)" stroke="#3A3F4B"/>
  </g>

  <rect x="58" y="44" width="1064" height="48" fill="#0A0B10"/>
  <rect x="58" y="44" width="8" height="48" fill="#D84B60"/>
