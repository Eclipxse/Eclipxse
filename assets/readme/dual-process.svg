    <path d="M32 32H1148V468H32Z" fill="none" stroke="#153B91" stroke-opacity=".62"/>
    <path d="M24 44H1156M24 454H1156" stroke="#153B91" stroke-opacity=".65"/>
    <text x="48" y="39" font-size="9" font-weight="700">REGISTER: DUAL_PROCESS // MODE: PARALLEL</text>
    <text x="930" y="39" font-size="9" font-weight="700">ARCHIVE 04 // 04.07.26</text>

    <text x="48" y="78" font-size="10" font-weight="700">THREAD_A / ENGINEERING</text>
    <text x="48" y="98" font-size="8">STATE      DETERMINISTIC</text>
    <text x="48" y="112" font-size="8">INPUT      PROBLEM</text>
    <text x="48" y="126" font-size="8">PROCESS    BUILD / TEST / SHIP</text>
    <text x="48" y="140" font-size="8">OUTPUT     WORKING SYSTEM</text>

    <text x="946" y="78" font-size="10" font-weight="700">THREAD_B / TASTE</text>
    <text x="946" y="98" font-size="8">STATE      INSTINCTIVE</text>
    <text x="946" y="112" font-size="8">INPUT      FEELING</text>
    <text x="946" y="126" font-size="8">PROCESS    CUT / REFINE / FRAME</text>
    <text x="946" y="140" font-size="8">OUTPUT     DESIRED OBJECT</text>

    <text x="48" y="190" font-size="8" opacity=".8">AX 002B   BX 1F3A   CX 4E7D</text>
    <text x="48" y="204" font-size="8" opacity=".8">DX 9E1B   SP 0E7C   SI 3E5F</text>
    <text x="48" y="218" font-size="8" opacity=".8">CALL MERGE_THREADS</text>
    <text x="48" y="232" font-size="8" opacity=".8">JMP OUTPUT_FINAL</text>

    <text x="958" y="190" font-size="8" opacity=".8">FORM 00101110</text>
    <text x="958" y="204" font-size="8" opacity=".8">COLOR 01010011</text>
    <text x="958" y="218" font-size="8" opacity=".8">SPACE 11100010</text>
    <text x="958" y="232" font-size="8" opacity=".8">RHYTHM 01001101</text>

    <path d="M590 46L578 80L600 112L582 148L602 182L579 218L597 254L576 292L602 326L580 366L598 404L586 454" fill="none" stroke="#F1EFE9" stroke-width="13"/>
    <path d="M590 46L578 80L600 112L582 148L602 182L579 218L597 254L576 292L602 326L580 366L598 404L586 454" fill="none" stroke="#153B91" stroke-opacity=".25" stroke-width="1"/>

    <rect x="498" y="144" width="70" height="54" fill="url(#check)" opacity=".38"/>
    <rect x="610" y="218" width="84" height="62" fill="url(#check)" opacity=".38"/>
    <rect x="510" y="276" width="58" height="38" fill="url(#check)" opacity=".3"/>

    <path d="M82 352H232M948 352H1098" stroke="#153B91" stroke-width="2"/>
    <path d="M50 368H250M930 368H1130" stroke="#153B91" stroke-opacity=".45"/>

    <text x="48" y="432" font-size="9">LOGIC WITHOUT TASTE IS NOISE.</text>
    <text x="930" y="432" font-size="9">TASTE WITHOUT LOGIC IS DECORATION.</text>
    <text x="486" y="470" font-size="8">MERGE STATUS: STABLE //</text>
