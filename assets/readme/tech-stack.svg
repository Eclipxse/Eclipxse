<svg width="1180" height="470" viewBox="0 0 1180 470" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Toolchain Rack</title>
  <desc id="desc">A black metal modular rack showing Eclipxse's preferred languages, runtimes, frameworks, and shipping tools.</desc>
  <defs>
