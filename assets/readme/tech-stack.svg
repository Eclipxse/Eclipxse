      <stop offset="1" stop-color="#06070A"/>
    </linearGradient>
    <linearGradient id="rack" x1="52" y1="36" x2="1128" y2="414" gradientUnits="userSpaceOnUse">
      <stop stop-color="#20232B"/>
      <stop offset="0.42" stop-color="#12141B"/>
      <stop offset="1" stop-color="#090A0E"/>
    </linearGradient>
    <linearGradient id="slot" x1="0" y1="0" x2="0" y2="1">
