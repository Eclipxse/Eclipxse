<svg width="1180" height="410" viewBox="0 0 1180 410" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Stack Keys</title>
  <desc id="desc">A bold graphite neo-brutalist tech stack board with skeuomorphic keycap buttons.</desc>
  <defs>
    <linearGradient id="key" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#F1F3F6"/>
      <stop offset="0.54" stop-color="#AEB5C0"/>
      <stop offset="1" stop-color="#737B88"/>
    </linearGradient>
    <linearGradient id="darkKey" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#242A35"/>
      <stop offset="1" stop-color="#0F1219"/>
    </linearGradient>
    <filter id="keyShadow" x="-10%" y="-10%" width="125%" height="130%">
      <feDropShadow dx="7" dy="7" stdDeviation="0" flood-color="#050507"/>
    </filter>
  </defs>

  <rect width="1180" height="410" fill="#090B10"/>
  <rect x="58" y="44" width="1064" height="286" rx="8" fill="#050507"/>
  <rect x="46" y="32" width="1064" height="286" rx="8" fill="#1A1E27" stroke="#050507" stroke-width="5"/>
  <path d="M80 102H1076" stroke="#303642" stroke-width="2"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="80" y="82" fill="#F4F5F7" font-size="31" font-weight="950">Stack Keys</text>
    <text x="260" y="82" fill="#AAB1BD" font-size="14" font-weight="800">tactile tools, clean build energy</text>

    <text x="80" y="140" fill="#8A92A3" font-size="12" font-weight="950" letter-spacing="2">LANGUAGES</text>
    <g filter="url(#keyShadow)" font-size="14" font-weight="950">
      <rect x="80" y="158" width="130" height="42" rx="8" fill="url(#darkKey)" stroke="#050507" stroke-width="4"/>
      <path d="M90 168H200" stroke="#FFFFFF" stroke-width="2" opacity="0.14"/>
      <text x="114" y="184" fill="#F4F5F7">PYTHON</text>
      <rect x="230" y="158" width="166" height="42" rx="8" fill="#8B5CF6" stroke="#050507" stroke-width="4"/>
      <path d="M240 168H386" stroke="#FFFFFF" stroke-width="2" opacity="0.36"/>
      <text x="260" y="184" fill="#F4F5F7">TYPESCRIPT</text>
      <rect x="416" y="158" width="128" height="42" rx="8" fill="url(#key)" stroke="#050507" stroke-width="4"/>
      <path d="M426 168H534" stroke="#FFFFFF" stroke-width="2" opacity="0.55"/>
      <text x="456" y="184" fill="#0B0D12">KOTLIN</text>
      <rect x="564" y="158" width="116" height="42" rx="8" fill="url(#darkKey)" stroke="#050507" stroke-width="4"/>
      <text x="602" y="184" fill="#F4F5F7">HTML</text>
      <rect x="700" y="158" width="104" height="42" rx="8" fill="#F87171" stroke="#050507" stroke-width="4"/>
      <text x="736" y="184" fill="#0B0D12">CSS</text>
    </g>

    <text x="80" y="248" fill="#8A92A3" font-size="12" font-weight="950" letter-spacing="2">APP + WEB</text>
    <g filter="url(#keyShadow)" font-size="14" font-weight="950">
      <rect x="80" y="266" width="118" height="42" rx="8" fill="url(#key)" stroke="#050507" stroke-width="4"/>
      <text x="118" y="292" fill="#0B0D12">REACT</text>
      <rect x="218" y="266" width="128" height="42" rx="8" fill="url(#darkKey)" stroke="#050507" stroke-width="4"/>
      <text x="252" y="292" fill="#F4F5F7">NODE.JS</text>
      <rect x="366" y="266" width="150" height="42" rx="8" fill="#8B5CF6" stroke="#050507" stroke-width="4"/>
      <text x="406" y="292" fill="#F4F5F7">ELECTRON</text>
      <rect x="536" y="266" width="106" height="42" rx="8" fill="url(#key)" stroke="#050507" stroke-width="4"/>
      <text x="572" y="292" fill="#0B0D12">VITE</text>
      <rect x="662" y="266" width="98" height="42" rx="8" fill="#F87171" stroke="#050507" stroke-width="4"/>
      <text x="696" y="292" fill="#0B0D12">BUN</text>
      <rect x="780" y="266" width="190" height="42" rx="8" fill="url(#darkKey)" stroke="#050507" stroke-width="4"/>
      <text x="820" y="292" fill="#F4F5F7">BROWSER SHELLS</text>
    </g>

    <rect x="844" y="136" width="232" height="92" rx="8" fill="#10131A" stroke="#050507" stroke-width="4"/>
    <path d="M856 148H1064" stroke="#FFFFFF" stroke-width="2" opacity="0.12"/>
    <text x="870" y="170" fill="#F4F5F7" font-size="18" font-weight="950">Workflow</text>
    <text x="870" y="196" fill="#AAB1BD" font-size="13" font-weight="800">GitHub / Vercel / Cloudflare</text>
    <rect x="870" y="208" width="148" height="8" rx="4" fill="#343B49"/>
    <rect x="870" y="208" width="78" height="8" rx="4" fill="#8B5CF6"/>
  </g>
</svg>
