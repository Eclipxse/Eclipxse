<svg width="1180" height="500" viewBox="0 0 1180 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Skill Constellation</title>
  <desc id="desc">A dark purple and red constellation-style tech stack board for Eclipxse.</desc>
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#2B0D4C"/>
      <stop offset="0.55" stop-color="#0B0412"/>
      <stop offset="1" stop-color="#05020A"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#A855F7" opacity="0.35"/>
    </pattern>
  </defs>

