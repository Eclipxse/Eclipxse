<svg width="1180" height="430" viewBox="0 0 1180 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Active Signal</title>
  <desc id="desc">A dark purple and red command-center board showing Eclipxse's active projects.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1180" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05020A"/>
      <stop offset="0.5" stop-color="#12051F"/>
      <stop offset="1" stop-color="#05020A"/>
    </linearGradient>
    <linearGradient id="panel" x1="70" y1="80" x2="1110" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#160827"/>
      <stop offset="1" stop-color="#08040F"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EF4444"/>
      <stop offset="0.55" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0.6 0 0 0 0.3 0 0.2 0 0 0.1 0 0 0.8 0 0.9 0 0 0 0.55 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#2E1450" stroke-width="1" opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="1180" height="430" fill="url(#bg)"/>
  <rect width="1180" height="430" fill="url(#grid)" opacity="0.65"/>
  <path d="M70 346H1110M92 90H1088M92 90L70 112V346L92 368H1088L1110 346V112L1088 90H92Z" stroke="#6D28D9" stroke-width="2"/>
  <path d="M112 112H1068V324H112V112Z" fill="url(#panel)" stroke="#31204C" stroke-width="1.5"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="132" y="156" fill="#F5F3FF" font-size="18" font-weight="800" letter-spacing="4">ECLIPXSE // ACTIVE SIGNAL</text>
    <text x="132" y="205" fill="#F5F3FF" font-size="56" font-weight="950">Now Cooking</text>
    <text x="134" y="235" fill="#A78BFA" font-size="17" font-weight="700">browser polish, bot systems, portfolio identity, micro tools</text>

    <g filter="url(#softGlow)">
      <circle cx="290" cy="286" r="34" fill="#090413" stroke="#A855F7" stroke-width="3"/>
      <path d="M290 254v64M258 286h64" stroke="#EF4444" stroke-width="5"/>
      <circle cx="290" cy="286" r="13" fill="#38BDF8"/>
    </g>
    <text x="344" y="280" fill="#F5F3FF" font-size="18" font-weight="900">AURA BROWSER</text>
    <text x="344" y="304" fill="#C4B5FD" font-size="13" font-weight="700">dark UI, SVG controls, smooth tabs</text>

    <rect x="690" y="136" width="300" height="42" rx="0" fill="#0A0612" stroke="#EF4444" stroke-width="1.5"/>
    <text x="716" y="164" fill="#F5F3FF" font-size="14" font-weight="850">01 / Discord Bot Lab</text>
    <path d="M660 157H690" stroke="#EF4444" stroke-width="3"/>
    <circle cx="656" cy="157" r="5" fill="#EF4444"/>

    <rect x="740" y="205" width="300" height="42" rx="0" fill="#0A0612" stroke="#A855F7" stroke-width="1.5"/>
    <text x="766" y="233" fill="#F5F3FF" font-size="14" font-weight="850">02 / Portfolio Rebuild</text>
    <path d="M710 226H740" stroke="#A855F7" stroke-width="3"/>
    <circle cx="706" cy="226" r="5" fill="#A855F7"/>

    <rect x="690" y="274" width="300" height="42" rx="0" fill="#0A0612" stroke="#38BDF8" stroke-width="1.5"/>
    <text x="716" y="302" fill="#F5F3FF" font-size="14" font-weight="850">03 / Micro Tools</text>
    <path d="M660 295H690" stroke="#38BDF8" stroke-width="3"/>
    <circle cx="656" cy="295" r="5" fill="#38BDF8"/>

    <path d="M1022 126l16 32 36 5-26 25 6 36-32-17-32 17 6-36-26-25 36-5 16-32z" fill="#F5F3FF" stroke="#A855F7" stroke-width="3"/>
    <text x="906" y="360" fill="#EF4444" font-size="12" font-weight="900" letter-spacing="3">LIVE ROADMAP</text>
  </g>

  <path d="M112 324H300L348 368M1068 112H914L872 90" stroke="#EF4444" stroke-width="2" opacity="0.75"/>
  <path d="M112 112H260L316 90M1068 324H920L866 368" stroke="#38BDF8" stroke-width="2" opacity="0.6"/>
</svg>
