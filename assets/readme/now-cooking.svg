    <text x="406" y="154" fill="#F4F5F7" font-size="18" font-weight="800">Discord Bots</text>
    <text x="406" y="181" fill="#9CA3AF" font-size="13" font-weight="600">music, commands, utility</text>
    <circle cx="409" cy="201" r="4" fill="#F87171"/>
    <circle cx="425" cy="201" r="4" fill="#4B5563"/>
    <circle cx="441" cy="201" r="4" fill="#4B5563"/>

