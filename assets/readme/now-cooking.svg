      <stop stop-color="#080A0F"/>
      <stop offset="1" stop-color="#11131A"/>
    </linearGradient>
    <linearGradient id="line" x1="96" y1="0" x2="1084" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/>
      <stop offset="0.55" stop-color="#6B7280"/>
      <stop offset="1" stop-color="#F87171"/>
    </linearGradient>
  </defs>

  <rect width="1180" height="320" fill="url(#bg)"/>
  <rect x="52" y="42" width="1076" height="236" rx="18" fill="#151821" stroke="#2A2F3A"/>
  <rect x="76" y="66" width="1028" height="188" rx="14" fill="#0F1117" stroke="#252A35"/>
  <path d="M96 96H1084" stroke="url(#line)" stroke-width="2"/>

