    <rect x="122" y="196" width="96" height="6" rx="3" fill="#8B5CF6"/>
    <rect x="224" y="196" width="42" height="6" rx="3" fill="#2D3340"/>

    <rect x="380" y="124" width="222" height="92" rx="12" fill="#171A23" stroke="#2C3140"/>
