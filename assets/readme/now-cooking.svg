  <rect x="58" y="336" width="1064" height="26" fill="#08090D"/>
  <rect x="58" y="336" width="170" height="26" fill="#E8EBF1"/>
  <text x="76" y="353" fill="#0A0B0F" font-family="Consolas, Segoe UI, sans-serif" font-size="10" font-weight="800">CURRENT TRANSMISSION</text>
