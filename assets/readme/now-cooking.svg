<svg width="1180" height="350" viewBox="0 0 1180 350" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Now Building</title>
  <desc id="desc">A bold graphite neo-brutalist project board with skeuomorphic raised panels.</desc>
  <defs>
    <linearGradient id="bevel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#F3F4F6"/>
      <stop offset="0.5" stop-color="#BCC2CC"/>
      <stop offset="1" stop-color="#7C8491"/>
    </linearGradient>
    <linearGradient id="darkBevel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#262B36"/>
      <stop offset="1" stop-color="#11141B"/>
    </linearGradient>
    <filter id="hardShadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="10" dy="10" stdDeviation="0" flood-color="#050507"/>
    </filter>
  </defs>

  <rect width="1180" height="350" fill="#090B10"/>
  <rect x="58" y="40" width="1064" height="250" rx="8" fill="#0D0F15"/>
  <rect x="46" y="28" width="1064" height="250" rx="8" fill="#1A1E27" stroke="#050507" stroke-width="5"/>
  <path d="M62 46H1094" stroke="#3B414D" stroke-width="2"/>
  <path d="M62 260H1094" stroke="#050507" stroke-width="3"/>
  <rect x="74" y="60" width="1008" height="52" rx="6" fill="#0B0D12" stroke="#050507" stroke-width="4"/>
  <rect x="84" y="70" width="138" height="12" fill="#8B5CF6"/>
  <rect x="84" y="88" width="74" height="12" fill="#F87171"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="248" y="93" fill="#F4F5F7" font-size="31" font-weight="950">Now Building</text>
    <text x="520" y="93" fill="#AAB1BD" font-size="14" font-weight="800">raised graphite / bold but not loud</text>

    <g filter="url(#hardShadow)">
      <rect x="84" y="142" width="238" height="86" rx="8" fill="url(#bevel)" stroke="#050507" stroke-width="4"/>
      <path d="M94 153H310" stroke="#FFFFFF" stroke-width="2" opacity="0.65"/>
      <path d="M94 216H310" stroke="#050507" stroke-width="3" opacity="0.35"/>
      <text x="108" y="176" fill="#0B0D12" font-size="18" font-weight="950">Aura Browser</text>
      <text x="108" y="201" fill="#252A35" font-size="13" font-weight="800">tabs, dark UI, controls</text>
      <rect x="108" y="211" width="92" height="7" rx="3.5" fill="#8B5CF6"/>
    </g>

    <g filter="url(#hardShadow)">
      <rect x="358" y="142" width="210" height="86" rx="8" fill="url(#darkBevel)" stroke="#050507" stroke-width="4"/>
      <path d="M368 153H556" stroke="#FFFFFF" stroke-width="2" opacity="0.16"/>
      <text x="382" y="176" fill="#F4F5F7" font-size="18" font-weight="950">Discord Bots</text>
      <text x="382" y="201" fill="#AAB1BD" font-size="13" font-weight="800">music + utility flows</text>
      <circle cx="386" cy="214" r="5" fill="#F87171"/>
      <circle cx="404" cy="214" r="5" fill="#6B7280"/>
      <circle cx="422" cy="214" r="5" fill="#6B7280"/>
    </g>

    <g filter="url(#hardShadow)">
      <rect x="604" y="142" width="210" height="86" rx="8" fill="url(#bevel)" stroke="#050507" stroke-width="4"/>
      <path d="M614 153H802" stroke="#FFFFFF" stroke-width="2" opacity="0.65"/>
      <text x="628" y="176" fill="#0B0D12" font-size="18" font-weight="950">Portfolio</text>
      <text x="628" y="201" fill="#252A35" font-size="13" font-weight="800">identity + layout</text>
      <rect x="628" y="211" width="98" height="7" rx="3.5" fill="#F87171"/>
    </g>

    <g filter="url(#hardShadow)">
      <rect x="850" y="142" width="210" height="86" rx="8" fill="url(#darkBevel)" stroke="#050507" stroke-width="4"/>
      <path d="M860 153H1048" stroke="#FFFFFF" stroke-width="2" opacity="0.16"/>
      <text x="874" y="176" fill="#F4F5F7" font-size="18" font-weight="950">Micro Tools</text>
      <text x="874" y="201" fill="#AAB1BD" font-size="13" font-weight="800">small useful builds</text>
      <rect x="874" y="211" width="68" height="7" rx="3.5" fill="#8B5CF6"/>
      <rect x="950" y="211" width="44" height="7" rx="3.5" fill="#F87171"/>
    </g>

    <text x="84" y="256" fill="#8A92A3" font-size="12" font-weight="900" letter-spacing="2">CURRENT MODE</text>
    <text x="218" y="256" fill="#F4F5F7" font-size="12" font-weight="900">shipping first, polishing hard after</text>
  </g>
</svg>
