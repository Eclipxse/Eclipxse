<svg width="1180" height="320" viewBox="0 0 1180 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Now Building</title>
  <desc id="desc">A sleek graphite project board with subtle purple and soft red accents.</desc>
  <defs>
