    <text x="84" y="302" fill="#707887" font-family="Consolas, Segoe UI, sans-serif" font-size="11">ELECTRON / TYPESCRIPT / VITE</text>
    <rect x="84" y="308" width="98" height="24" rx="3" fill="#231A37" stroke="#8152DC"/>
    <circle cx="98" cy="320" r="4" fill="#9D68FF"/>
    <text x="110" y="324" fill="#ECE8F7" font-family="Consolas, Segoe UI, sans-serif" font-size="10" font-weight="700">IN BUILD</text>

    <rect x="382" y="106" width="470" height="210" rx="6" fill="#050609" stroke="#505764" stroke-width="2"/>
    <rect x="390" y="114" width="454" height="194" rx="3" fill="url(#screen)"/>
    <rect x="390" y="114" width="454" height="28" fill="#20232C"/>
    <circle cx="407" cy="128" r="4" fill="#D84B60"/>
    <circle cx="421" cy="128" r="4" fill="#646C79"/>
    <circle cx="435" cy="128" r="4" fill="#9D68FF"/>
    <rect x="462" y="121" width="248" height="14" rx="3" fill="#11131A" stroke="#343945"/>
    <path d="M476 128H690" stroke="#4B5260"/>
    <rect x="720" y="121" width="14" height="14" rx="2" fill="#2A203E"/>
    <path d="M725 128H729M727 126V130" stroke="#A878FF" stroke-width="1.5" stroke-linecap="round"/>
    <rect x="390" y="142" width="454" height="166" fill="url(#screenGlow)"/>
    <rect x="406" y="158" width="72" height="134" rx="3" fill="#0D0F15" stroke="#2D323D"/>
    <rect x="418" y="172" width="48" height="6" rx="2" fill="#9D68FF"/>
    <rect x="418" y="192" width="32" height="5" rx="2" fill="#454C59"/>
    <rect x="418" y="208" width="38" height="5" rx="2" fill="#454C59"/>
    <rect x="418" y="224" width="27" height="5" rx="2" fill="#D84B60"/>
    <rect x="418" y="259" width="48" height="20" rx="3" fill="#1C1728" stroke="#6241A7"/>
    <path d="M430 269H454" stroke="#AE82FF" stroke-width="2" stroke-linecap="round"/>
    <text x="514" y="180" fill="#7D8594" font-family="Consolas, Segoe UI, sans-serif" font-size="10">NEW TAB / AURA://HOME</text>
    <text x="514" y="221" fill="#F2F3F6" font-size="27" font-weight="800">Browse your way.</text>
    <text x="514" y="246" fill="#8D95A4" font-size="12">quiet chrome / sharp controls / zero clutter</text>
    <rect x="514" y="267" width="94" height="24" rx="3" fill="#8A55F0"/>
    <text x="534" y="283" fill="#FFFFFF" font-family="Consolas, Segoe UI, sans-serif" font-size="10" font-weight="700">OPEN DECK</text>
    <rect x="620" y="267" width="72" height="24" rx="3" fill="#151821" stroke="#3C424F"/>
    <text x="638" y="283" fill="#B2B8C3" font-family="Consolas, Segoe UI, sans-serif" font-size="10">GITHUB</text>

    <text x="886" y="128" fill="#858D9C" font-family="Consolas, Segoe UI, sans-serif" font-size="11" font-weight="700">BUILD CHANNELS</text>
    <g font-family="Consolas, Segoe UI, sans-serif">
      <rect x="886" y="146" width="208" height="40" rx="3" fill="#11131A" stroke="#343945"/>
      <rect x="886" y="146" width="5" height="40" fill="#9D68FF"/>
      <text x="906" y="164" fill="#EEF0F4" font-size="11" font-weight="700">01 / INTERFACE</text>
      <text x="906" y="178" fill="#727A89" font-size="9">DARK SYSTEM UI</text>
      <rect x="886" y="194" width="208" height="40" rx="3" fill="#11131A" stroke="#343945"/>
      <rect x="886" y="194" width="5" height="40" fill="#596170"/>
      <text x="906" y="212" fill="#EEF0F4" font-size="11" font-weight="700">02 / NAVIGATION</text>
      <text x="906" y="226" fill="#727A89" font-size="9">TABS + SHORTCUTS</text>
      <rect x="886" y="242" width="208" height="40" rx="3" fill="#11131A" stroke="#343945"/>
      <rect x="886" y="242" width="5" height="40" fill="#D84B60"/>
      <text x="906" y="260" fill="#EEF0F4" font-size="11" font-weight="700">03 / POLISH</text>
      <text x="906" y="274" fill="#727A89" font-size="9">MOTION + DETAILS</text>
      <rect x="886" y="294" width="208" height="22" rx="3" fill="#201629" stroke="#563675"/>
      <text x="906" y="309" fill="#C69AFF" font-size="9" font-weight="700">TRANSMISSION ACTIVE</text>
      <path d="M1044 305H1076" stroke="#D84B60" stroke-width="2"/>
      <circle cx="1082" cy="305" r="3" fill="#D84B60" filter="url(#glow)"/>
