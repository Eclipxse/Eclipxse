<svg width="1180" height="420" viewBox="0 0 1180 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Project Deck</title>
  <desc id="desc">A dark hardware-inspired project console featuring Aura Browser.</desc>
  <defs>
    <linearGradient id="back" x1="0" y1="0" x2="1180" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050609"/>
      <stop offset="0.55" stop-color="#0B0C12"/>
      <stop offset="1" stop-color="#050609"/>
    </linearGradient>
    <linearGradient id="chassis" x1="62" y1="42" x2="1118" y2="370" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D2028"/>
      <stop offset="0.38" stop-color="#11131A"/>
      <stop offset="1" stop-color="#090A0F"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#5B6270"/>
      <stop offset="0.22" stop-color="#D8DEE8"/>
      <stop offset="0.5" stop-color="#646B78"/>
      <stop offset="0.78" stop-color="#C5CAD4"/>
      <stop offset="1" stop-color="#404652"/>
    </linearGradient>
    <linearGradient id="signal" x1="420" y1="0" x2="1100" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9D68FF"/>
      <stop offset="0.56" stop-color="#6A42D9"/>
      <stop offset="1" stop-color="#D84B60"/>
    </linearGradient>
    <linearGradient id="screen" x1="430" y1="104" x2="868" y2="314" gradientUnits="userSpaceOnUse">
      <stop stop-color="#171923"/>
      <stop offset="1" stop-color="#090A0F"/>
    </linearGradient>
    <radialGradient id="screenGlow" cx="0" cy="0" r="1" gradientTransform="translate(690 235) rotate(132) scale(270 190)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7B47E4" stop-opacity="0.24"/>
      <stop offset="0.48" stop-color="#21143D" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#090A0F" stop-opacity="0"/>
    </radialGradient>
    <pattern id="mesh" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" stroke="#FFFFFF" stroke-opacity="0.025"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="145%">
      <feDropShadow dx="12" dy="14" stdDeviation="0" flood-color="#000000" flood-opacity="0.9"/>
      <feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1180" height="420" fill="url(#back)"/>
  <rect width="1180" height="420" fill="url(#mesh)"/>
  <g filter="url(#shadow)">
    <rect x="50" y="36" width="1080" height="334" rx="8" fill="#06070A" stroke="#2B2F39" stroke-width="2"/>
    <rect x="58" y="44" width="1064" height="318" rx="5" fill="url(#chassis)" stroke="#3A3F4B"/>
  </g>

  <path d="M58 92H1122" stroke="#343945"/>
  <rect x="58" y="44" width="8" height="48" fill="#8A55F0"/>
  <rect x="66" y="44" width="158" height="48" fill="#171923"/>
  <text x="84" y="74" fill="#F1F3F7" font-family="Consolas, Segoe UI, sans-serif" font-size="14" font-weight="700">PROJECT DECK // 01</text>
  <text x="246" y="74" fill="#777F8E" font-family="Consolas, Segoe UI, sans-serif" font-size="12">ECLIPXSE LABS</text>
  <circle cx="1048" cy="68" r="5" fill="#9D68FF" filter="url(#glow)"/>
  <text x="1062" y="72" fill="#C9CED8" font-family="Consolas, Segoe UI, sans-serif" font-size="11" font-weight="700">ONLINE</text>

