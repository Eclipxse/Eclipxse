<svg width="1280" height="430" viewBox="0 0 1280 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Eclipxse profile hero</title>
  <desc id="desc">A dark cinematic profile banner for Eclipxse, also known as Mario.cpp.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05070D"/>
      <stop offset="0.45" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#16091F"/>
    </linearGradient>
    <linearGradient id="aura" x1="110" y1="70" x2="1120" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF4FD8"/>
      <stop offset="0.48" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#FACC15"/>
    </linearGradient>
    <radialGradient id="eclipse" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1045 185) rotate(90) scale(145)">
      <stop offset="0" stop-color="#FACC15"/>
      <stop offset="0.45" stop-color="#FF4FD8"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" stroke="#30363D" stroke-width="1" opacity="0.65"/>
      <circle cx="0" cy="0" r="1.7" fill="#30363D"/>
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

